<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>explorador de series</title>

    <!-- enlace al css -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<!-- encabezado principal -->
<header>
    <h1>explorador de series</h1>
    <p>busca y explora información</p>
</header>

<!-- seccion del buscador -->
<section class="search">
    <!-- formulario que llama a la funcion buscarSerie -->
    <form onsubmit="buscarSerie(event)">
        <input type="text" id="serieInput" placeholder="buscar serie...">
        <button type="submit">buscar</button>
    </form>
</section>

<!-- contenedor donde aparecen los resultados -->
<section id="resultados" class="results"></section>

<!-- menu de opciones de la serie -->
<section class="menu">
    <button onclick="infoSerie()">información</button>
    <button onclick="actores()">actores</button>
    <button onclick="temporadas()">temporadas</button>
    <button onclick="imagenes()">galería</button>
</section>

<!-- contenedor donde se muestra la informacion -->
<section id="datos" class="data"></section>

<!-- script principal -->
<script src="js/app.js"></script>

</body>
</html>
